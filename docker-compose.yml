version: '3.8'

services:
  # ── Development server ──────────────────────────
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - '3000:3000'
    command: sh -c "npm ci && npm run dev"
    environment:
      - NODE_ENV=development
    profiles: ['dev']

  # ── Production static server (Nginx) ────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - '80:80'
    restart: unless-stopped
    profiles: ['prod']

volumes:
  node_modules:
